<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TÜRKSAT 2A – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js" crossorigin="anonymous"></script>
  <!-- styles via site.css -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'tr';
      document.documentElement.lang = lang;
      const trBtn = document.getElementById('lang-tr');
      const enBtn = document.getElementById('lang-en');
      if (trBtn && enBtn) {
        if (lang === 'tr') {
          trBtn.classList.add('active');
        } else {
          enBtn.classList.add('active');
        }
        function setLang(code) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', code);
          window.location.href = url.toString();
        }
        trBtn.onclick = () => setLang('tr');
        enBtn.onclick = () => setLang('en');
      }
    });
  </script>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/model-viewer-debug.js" defer></script>
<style>
    html, body {
      overflow-x: hidden !important;
      width: 100% !important;
      position: relative !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    * {
      box-sizing: border-box !important;
    }
    
</style></head>
<body>
  <div data-include="/header-tr.html"></div>

  <h1 style="margin-top: 20px;">TÜRKSAT 2A</h1>

  <div class="container">
    <p>TÜRKSAT 2A, geniş kapsama alanıyla yayın ve haberleşme hizmeti sunan bir uydudur.</p>
    <model-viewer id="mainViewer" data-track="model_view" data-model-name="turksat-3b" src="/assets/models/zaglushka.glb" camera-controls ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
    <!-- Проверка доступа к premium-модели -->
    <script>
      async function loadProtectedModel() {
        const viewer = document.getElementById('mainViewer');
        const modelSlug = "atlas-turksat-2A";

        viewer.src = "/assets/models/zaglushka.glb";

        try {
          const response = await fetch(`https://albaspace-api.nncdecdgc.workers.dev/product-access?slug=${modelSlug}`, {
            credentials: "include"
          });

          if (response.ok) {
            const data = await response.json();
            if (data.access === "premium") {
              console.log("✅ Доступ разрешен! Загружаем", modelSlug);
              // model-viewer не отправляет cookie сам — качаем вручную и создаём blob URL
              const modelRes = await fetch(
                `https://albaspace-api.nncdecdgc.workers.dev/model?slug=${modelSlug}`,
                { credentials: "include" }
              );
              const blob = await modelRes.blob();
              viewer.src = URL.createObjectURL(blob);
            } else {
              console.log("🔒 Нет доступа, показываем заглушку.");
            }
          }
        } catch (err) {
          console.error("Ошибка при проверке доступа:", err);
        }
      }

      document.addEventListener('DOMContentLoaded', loadProtectedModel);
    </script>

  </div>

  
  <!-- ═══════════════════════════════════════
       ADD TO CART — 50 TL
  ════════════════════════════════════════════ -->
  <div class="mv-add-cart-wrap" id="mvCartWrap">
    <button class="mv-add-cart-btn" id="mvAddCartBtn">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;flex-shrink:0"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Sepete Ekle
    </button>
    <span class="mv-price-label">50 TL</span>
  </div>

  <script>
  (function(){
    var btn = document.getElementById('mvAddCartBtn');
    if (!btn) return;
    function getModelName() {
      var h1 = document.querySelector('h1');
      if (h1) return h1.textContent.trim();
      return document.title.split('\u2013')[0].split('-')[0].trim() || 'Model';
    }
    function getSlug() {
      var m = window.location.pathname.match(/atlas\/([^\/]+)/);
      return m ? m[1] : 'model';
    }
    function getImage() {
      var v = document.getElementById('mainViewer');
      if (v) {
        var src = v.getAttribute('src') || '';
        var m = src.match(/\/assets\/models\/([^.]+)\.glb/);
        if (m) return '/assets/models-pictures/' + m[1] + '.png';
      }
      return '/assets/icons/alien.png';
    }
    function showToast(name) {
      var t = document.getElementById('albaCartToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'albaCartToast';
        t.className = 'alba-cart-toast';
        document.body.appendChild(t);
      }
      t.textContent = '\uD83D\uDED2 ' + name + ' sepete eklendi!';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    btn.addEventListener('click', function(){
      var id = getSlug(), name = getModelName(), img = getImage(), price = 50;
      if (window.cartManager && window.cartManager.addItem) {
        window.cartManager.addItem({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 });
      } else {
        try {
          var cart = JSON.parse(localStorage.getItem('alba_space_cart_v1') || '[]');
          var idx = cart.findIndex(function(e){ return e.id === id; });
          if (idx >= 0) { cart[idx].qty += 1; }
          else { cart.push({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 }); }
          localStorage.setItem('alba_space_cart_v1', JSON.stringify(cart));
          var total = cart.reduce(function(s,e){ return s+(Number(e.qty)||0); }, 0);
          document.querySelectorAll('[data-cart-count],.cart-count').forEach(function(b){ b.textContent=String(total); });
        } catch(ex){}
      }
      showToast(name);
    });
  }());
  </script>

  <div data-include="/footer-tr.html"></div>
</body>
</html>
