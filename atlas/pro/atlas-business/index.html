<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>WebAR Визитка</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; 
        background-color: transparent !important; 
        font-family: system-ui, Arial, Helvetica, sans-serif; 
        color: #fff; 
      }
      .a-canvas { background-color: transparent !important; }
      video {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        object-fit: cover; z-index: -2;
      }
      .overlay {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      }
      .overlay h1 { font-size: 16px; margin: 0; font-weight: 600; }
      .overlay p { margin: 0; font-size: 12px; opacity: 0.9; }
      .actions { display: flex; gap: 8px; }
      .btn {
        appearance: none; border: 1px solid #3d82f6; color: #fff; background: #3b82f6;
        padding: 6px 10px; border-radius: 8px; font-size: 12px; text-decoration: none; cursor: pointer;
      }
      .btn.secondary { background: rgba(0,0,0,0.5); border-color: #888; }
      .hint {
        position: fixed; left: 50%; transform: translateX(-50%); bottom: 20px; z-index: 10;
        background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; font-size: 12px;
        text-align: center; width: 80%;
      }
    
</style>
  </head>
  
  <body>
    <div class="overlay">
      <div>
        <h1>Business AR Card</h1>
        <p>Point camera at the image target.</p>
      </div>
      <div class="actions">
        <button id="btn-start" class="btn">Start AR</button>
        <button id="btn-torch" class="btn secondary" style="display: none;">Light</button>
      </div>
    </div>
    <div id="hint-text" class="hint">Loading the model... Please wait.</div>
    
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001; autoStart: true;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="myModel" src="./model2.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity light="type: ambient; intensity: 1.0"></a-entity>
      <a-entity light="type: directional; intensity: 1.0" position="1 1 0.5"></a-entity>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#myModel" 
          rotation="0 0 0" 
          position="0 0 -1" 
          scale="0.05 0.05 0.05" 
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>
    </a-scene>
    
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('a-scene');
        const hintEl = document.getElementById('hint-text');
        const startBtn = document.getElementById('btn-start');
        const torchBtn = document.getElementById("btn-torch");

        startBtn.addEventListener('click', () => {
           const video = document.querySelector("video");
           if (video) video.play();
        });

        sceneEl.addEventListener("arReady", (event) => {
          hintEl.innerText = "Find the target image!";
          startBtn.style.display = "none";
          
          const video = document.querySelector("video");
          if (video && video.srcObject) {
            const track = video.srcObject.getVideoTracks()[0];
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            if (capabilities.torch) {
              torchBtn.style.display = "inline-block";
              let isTorchOn = false;
              torchBtn.addEventListener("click", async () => {
                try {
                  await track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
                  isTorchOn = !isTorchOn;
                } catch (err) { console.error(err); }
              });
            }
          }
        });

        sceneEl.addEventListener("targetFound", event => {
          hintEl.innerText = "Target found!";
          hintEl.style.backgroundColor = "green";
        });

        sceneEl.addEventListener("targetLost", event => {
          hintEl.innerText = "Target lost. Keep it in view.";
          hintEl.style.backgroundColor = "rgba(0,0,0,0.7)";
        });
      });
    </script>
  
  <!-- ═══════════════════════════════════════
       ADD TO CART — 50 TL
  ════════════════════════════════════════════ -->
  <div class="mv-add-cart-wrap" id="mvCartWrap">
    <button class="mv-add-cart-btn" id="mvAddCartBtn">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;flex-shrink:0"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Sepete Ekle
    </button>
    <span class="mv-price-label">50 TL</span>
  </div>

  <script>
  (function(){
    var btn = document.getElementById('mvAddCartBtn');
    if (!btn) return;
    function getModelName() {
      var h1 = document.querySelector('h1');
      if (h1) return h1.textContent.trim();
      return document.title.split('\u2013')[0].split('-')[0].trim() || 'Model';
    }
    function getSlug() {
      var m = window.location.pathname.match(/atlas\/([^\/]+)/);
      return m ? m[1] : 'model';
    }
    function getImage() {
      var v = document.getElementById('mainViewer');
      if (v) {
        var src = v.getAttribute('src') || '';
        var m = src.match(/\/assets\/models\/([^.]+)\.glb/);
        if (m) return '/assets/models-pictures/' + m[1] + '.png';
      }
      return '/assets/icons/alien.png';
    }
    function showToast(name) {
      var t = document.getElementById('albaCartToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'albaCartToast';
        t.className = 'alba-cart-toast';
        document.body.appendChild(t);
      }
      t.textContent = '\uD83D\uDED2 ' + name + ' sepete eklendi!';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    btn.addEventListener('click', function(){
      var id = getSlug(), name = getModelName(), img = getImage(), price = 50;
      if (window.cartManager && window.cartManager.addItem) {
        window.cartManager.addItem({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 });
      } else {
        try {
          var cart = JSON.parse(localStorage.getItem('alba_space_cart_v1') || '[]');
          var idx = cart.findIndex(function(e){ return e.id === id; });
          if (idx >= 0) { cart[idx].qty += 1; }
          else { cart.push({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 }); }
          localStorage.setItem('alba_space_cart_v1', JSON.stringify(cart));
          var total = cart.reduce(function(s,e){ return s+(Number(e.qty)||0); }, 0);
          document.querySelectorAll('[data-cart-count],.cart-count').forEach(function(b){ b.textContent=String(total); });
        } catch(ex){}
      }
      showToast(name);
    });
  }());
  </script>

</body>
</html>
