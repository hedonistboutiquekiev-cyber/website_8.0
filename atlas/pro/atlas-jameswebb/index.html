  <style> :root { --header-bg: #020617; --accent: #00c2ff; } * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: Arial, sans-serif; background-size: cover; color: #fff; opacity: 0; animation: fadeInBody 0.8s ease-out forwards; } @keyframes fadeInBody { to { opacity: 1; } } /* HEADER */    .header-logo img { width: 40px; height: 40px; border-radius: 999px; padding: 4px; } .header-logo span { font-weight: 600; font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase; }  .main-nav a { color: #d1d5db; text-decoration: none; position: relative; padding-bottom: 2px; } .main-nav a:hover { color: #ffffff; } .main-nav a.active::after { content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 2px; border-radius: 999px; }  .social-icon-svg { width: 22px; height: 22px; fill: none; stroke: #e5e7eb; stroke-width: 1.6; transition: stroke 0.2s, transform 0.15s; } .header-social a:hover .social-icon-svg { stroke: #ffffff; transform: translateY(-1px); } .top-lang-switch { display: flex; gap: 6px; align-items: center; font-size: 13px; } .top-lang-switch a { padding: 4px 10px; border-radius: 999px; border: 1px solid #4b5563; color: #e5e7eb; text-decoration: none; } .top-lang-switch a.active { color: #020617; font-weight: 600; } /* КОНТЕНТ СТРАНИЦЫ */ h1 { text-align: center; margin-top: 100px; margin-bottom: 15px; font-size: 32px; text-shadow: 0 0 15px #000; } .container { width: 90%; max-width: 1200px; margin: auto; padding-bottom: 50px; backdrop-filter: blur(2px); } p { text-align: center; font-size: 18px; text-shadow: 0 0 8px #000; max-width: 900px; margin: 20px auto; } model-viewer { width: 100%; height: 600px; margin-top: 30px; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 150, 255, 0.5); } @media (max-width: 768px) { h1 { font-size: 26px; margin-top: 90px; } model-viewer { height: 420px; } }

<body>
  <div data-include="/header-tr.html"></div>

    <h1 style="margin-top: 20px;">James Webb Uzay Teleskobu</h1>

  <div class="container">
    <p>
      James Webb Uzay Teleskobu, erken evreni ve ötegezegen atmosferlerini incelemek için tasarlanmıştır.
    </p>




    <model-viewer
      data-track="model_view" data-model-name="jameswebb" src="/assets/models/jameswebb.glb"
      camera-controls
      ar
      ar-modes="webxr scene-viewer quick-look">
    </model-viewer>

  
  <!-- ═══════════════════════════════════════
       ADD TO CART — 50 TL
  ════════════════════════════════════════════ -->
  <div class="mv-add-cart-wrap" id="mvCartWrap">
    <button class="mv-add-cart-btn" id="mvAddCartBtn">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;flex-shrink:0"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Sepete Ekle
    </button>
    <span class="mv-price-label">50 TL</span>
  </div>

  <script>
  (function(){
    var btn = document.getElementById('mvAddCartBtn');
    if (!btn) return;
    function getModelName() {
      var h1 = document.querySelector('h1');
      if (h1) return h1.textContent.trim();
      return document.title.split('\u2013')[0].split('-')[0].trim() || 'Model';
    }
    function getSlug() {
      var m = window.location.pathname.match(/atlas\/([^\/]+)/);
      return m ? m[1] : 'model';
    }
    function getImage() {
      var v = document.getElementById('mainViewer');
      if (v) {
        var src = v.getAttribute('src') || '';
        var m = src.match(/\/assets\/models\/([^.]+)\.glb/);
        if (m) return '/assets/models-pictures/' + m[1] + '.png';
      }
      return '/assets/icons/alien.png';
    }
    function showToast(name) {
      var t = document.getElementById('albaCartToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'albaCartToast';
        t.className = 'alba-cart-toast';
        document.body.appendChild(t);
      }
      t.textContent = '\uD83D\uDED2 ' + name + ' sepete eklendi!';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    btn.addEventListener('click', function(){
      var id = getSlug(), name = getModelName(), img = getImage(), price = 50;
      if (window.cartManager && window.cartManager.addItem) {
        window.cartManager.addItem({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 });
      } else {
        try {
          var cart = JSON.parse(localStorage.getItem('alba_space_cart_v1') || '[]');
          var idx = cart.findIndex(function(e){ return e.id === id; });
          if (idx >= 0) { cart[idx].qty += 1; }
          else { cart.push({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 }); }
          localStorage.setItem('alba_space_cart_v1', JSON.stringify(cart));
          var total = cart.reduce(function(s,e){ return s+(Number(e.qty)||0); }, 0);
          document.querySelectorAll('[data-cart-count],.cart-count').forEach(function(b){ b.textContent=String(total); });
        } catch(ex){}
      }
      showToast(name);
    });
  }());
  </script>

  <div data-include="/footer-tr.html"></div>



    <!-- Model Viewer Fix Script - Direct initialization -->
  <script>
    (function() {
      console.log('[Model-Viewer Init] Checking model-viewer status...');
      
      // Wait for model-viewer to be loaded
      const checkModelViewer = () => {
        const viewer = document.querySelector('model-viewer');
        if (!viewer) {
          console.log('[Model-Viewer Init] No model-viewer element found');
          return;
        }
        
        // Check if custom element is registered
        if (window.customElements && window.customElements.get('model-viewer')) {
          console.log('[Model-Viewer Init] model-viewer element is registered ✓');
          return;
        }
        
        // If not registered yet, check again in 500ms
        setTimeout(checkModelViewer, 500);
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkModelViewer);
      } else {
        setTimeout(checkModelViewer, 100);
      }
    })();
  </script>
</body>
