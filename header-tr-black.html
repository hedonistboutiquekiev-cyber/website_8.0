<script>
(function () {

  /* ── Белый фон: shop, cart, product-* ── */
    /* ── Определяем цвет фона хедера ── */
  function getHeaderBg() {
    var header = document.querySelector('.site-header');
    if (!header) return 'rgba(2,6,23,0.99)';
    var bg = window.getComputedStyle(header).backgroundColor;
    // Если прозрачный — берём тёмный дефолт
    if (!bg || bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent') {
      return document.documentElement.classList.contains('product-text-black')
        ? '#ffffff' : 'rgba(2,6,23,0.99)';
    }
    return bg;
  }

  function isWhiteBgPage() {
    return (
      document.documentElement.classList.contains('product-text-black') ||
      /\/(shop|cart)(\.html|\/)?/.test(window.location.pathname.toLowerCase()) ||
      /\/product-[^/]+/.test(window.location.pathname.toLowerCase())
    );
  }

  /* ── Позиционирование ── */
  function positionAlienMenu(menu, trigger) {
    var isMobile = window.innerWidth <= 767;
    var headerEl = document.querySelector('.site-header');
    var hb = headerEl ? headerEl.getBoundingClientRect().bottom : 60;

    // На мобильном — мобильное меню
    if (isMobile) {
      menu.style.top = hb + 'px';
      menu.style.left = '0';
      menu.style.right = '0';
      menu.style.width = '100vw';
      menu.style.transform = 'none';
      return;
    }

    // Десктоп: горизонтальная полоса под хедером, от левого края
    menu.style.top = hb + 'px';
    menu.style.left = '0';
    menu.style.right = '0';
    menu.style.width = '100%';
    menu.style.transform = 'none';

    // Цвет фона — как у хедера
    var isWhite = isWhiteBgPage();
    menu.style.background = isWhite ? '#ffffff' : 'rgba(2,6,23,0.99)';
    menu.style.color = isWhite ? '#111827' : '#ffffff';
    menu.style.borderTop = isWhite
      ? '1px solid rgba(0,0,0,0.1)'
      : '1px solid rgba(0,194,255,0.15)';
  }

  function closeAlienMenu() {
    var menu = document.getElementById('alienMenu');
    var trigger = document.querySelector('.alien-ghost');
    if (menu) menu.setAttribute('hidden', '');
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
  }

  function toggleAlienMenu(e) {
    if (e) e.preventDefault();
    if (window.innerWidth <= 767) {
      window.location.href = '/account-menu.html';
      return;
    }
    var menu = document.getElementById('alienMenu');
    var trigger = document.querySelector('.alien-ghost');
    if (!menu || !trigger) return;
    if (menu.hasAttribute('hidden')) {
      positionAlienMenu(menu, trigger);
      menu.removeAttribute('hidden');
      trigger.setAttribute('aria-expanded', 'true');
    } else {
      closeAlienMenu();
    }
  }

  window.addEventListener('resize', function () {
    var menu = document.getElementById('alienMenu');
    var trigger = document.querySelector('.alien-ghost');
    if (menu && trigger && !menu.hasAttribute('hidden')) positionAlienMenu(menu, trigger);
  });

  document.addEventListener('click', function (e) {
    var container = document.querySelector('.alien-dropdown-container');
    var menu = document.getElementById('alienMenu');
    if (menu && !menu.hasAttribute('hidden') && container && !container.contains(e.target)) {
      closeAlienMenu();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeAlienMenu();
  });

  window.toggleAlienMenu = toggleAlienMenu;

  /* ── LANG DROPDOWN ── */
  function toggleLangDropdown(e) {
    if (e) e.preventDefault();
    var wrap = document.getElementById('langDropdown');
    var panel = wrap ? wrap.querySelector('.lang-dropdown-menu') : null;
    var btn   = wrap ? wrap.querySelector('.lang-dropdown-trigger') : null;
    if (!panel) return;
    var isOpen = !panel.hasAttribute('hidden');
    if (isOpen) {
      panel.setAttribute('hidden', '');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    } else {
      panel.removeAttribute('hidden');
      if (btn) btn.setAttribute('aria-expanded', 'true');
    }
  }

  document.addEventListener('click', function (e) {
    var wrap = document.getElementById('langDropdown');
    var panel = wrap ? wrap.querySelector('.lang-dropdown-menu') : null;
    if (panel && wrap && !wrap.contains(e.target) && !panel.hasAttribute('hidden')) {
      panel.setAttribute('hidden', '');
      var btn = wrap.querySelector('.lang-dropdown-trigger');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
  });

  window.toggleLangDropdown = toggleLangDropdown;

})();
</script>
