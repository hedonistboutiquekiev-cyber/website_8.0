<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voyager 1 – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js" crossorigin="anonymous"></script>
  <!-- styles via site.css -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'tr';
      document.documentElement.lang = lang;
      const trBtn = document.getElementById('lang-tr');
      const enBtn = document.getElementById('lang-en');
      if (trBtn && enBtn) {
        if (lang === 'tr') {
          trBtn.classList.add('active');
        } else {
          enBtn.classList.add('active');
        }
        function setLang(code) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', code);
          window.location.href = url.toString();
        }
        trBtn.onclick = () => setLang('tr');
        enBtn.onclick = () => setLang('en');
      }
    });
  </script>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="stylesheet" href="/assets/css/model-viewer-controls.css" />
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/model-viewer-debug.js" defer></script>
<style>
    html, body {
      overflow-x: hidden !important;
      width: 100% !important;
      position: relative !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    * {
      box-sizing: border-box !important;
    }
    </style></head>
<body>
  <div data-include="/header-tr.html"></div>

  <h1 style="margin-top: 20px;">Voyager 1</h1>

  <div class="container">
    <p>Voyager 1, Güneş Sistemi'ni terk ederek yıldızlararası uzaya giren ilk uzay aracıdır.</p>

      <div class="alba-status" id="albaStatus">Müzik seç ve dinle 🎵</div>
    </div>
  

  </div>

  
  <!-- ═══════════════════════════════════════
       ADD TO CART — 50 TL
  ════════════════════════════════════════════ -->
  <div class="mv-add-cart-wrap" id="mvCartWrap">
    <button class="mv-add-cart-btn" id="mvAddCartBtn">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Sepete Ekle
    </button>
    <span class="mv-price-label">50 TL</span>
  </div>

  <script>
  (function(){
    var btn = document.getElementById('mvAddCartBtn');
    if (!btn) return;

    // Вычитываем название из <title> или <h1>
    function getModelName() {
      var h1 = document.querySelector('h1');
      if (h1) return h1.textContent.trim();
      var t = document.title;
      return t.split('–')[0].split('-')[0].trim() || 'Model';
    }

    // slug из URL: /atlas/atlas-voyager1/ → atlas-voyager1
    function getSlug() {
      var m = window.location.pathname.match(/atlas\/([^\/]+)/);
      return m ? m[1] : window.location.pathname.replace(/\/+/g,'').replace(/index\.html$/,'') || 'model';
    }

    // Картинка: берём превью если оно есть, иначе alien
    function getImage() {
      var slug = getSlug();
      // Попробуем угадать имя .glb
      var viewer = document.getElementById('mainViewer');
      if (viewer) {
        var src = viewer.getAttribute('src') || '';
        var m = src.match(/\/assets\/models\/([^.]+)\.glb/);
        if (m) return '/assets/models-pictures/' + m[1] + '.png';
      }
      return '/assets/icons/alien.png';
    }

    function showToast(name) {
      var t = document.getElementById('albaCartToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'albaCartToast';
        t.className = 'alba-cart-toast';
        document.body.appendChild(t);
      }
      t.textContent = '🛒 ' + name + ' sepete eklendi!';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }

    btn.addEventListener('click', function(){
      var id    = getSlug();
      var name  = getModelName();
      var img   = getImage();
      var price = 50;

      if (window.cartManager && window.cartManager.addItem) {
        window.cartManager.addItem({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 });
      } else {
        try {
          var cart = JSON.parse(localStorage.getItem('alba_space_cart_v1') || '[]');
          var idx  = cart.findIndex(function(e){ return e.id === id; });
          if (idx >= 0) { cart[idx].qty += 1; }
          else { cart.push({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 }); }
          localStorage.setItem('alba_space_cart_v1', JSON.stringify(cart));
          var total = cart.reduce(function(s,e){ return s+(Number(e.qty)||0);},0);
          document.querySelectorAll('[data-cart-count],.cart-count').forEach(function(b){ b.textContent=String(total); });
        } catch(e){}
      }
      showToast(name);
    });
  }());
  </script>

  <div data-include="/footer-tr.html"></div>

</body>
</html>
