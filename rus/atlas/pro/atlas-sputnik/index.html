<style> :root { --header-bg: #020617; --accent: #00c2ff; } * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: Arial, sans-serif; background-size: cover; color: #fff; opacity: 0; animation: fadeInBody 0.8s ease-out forwards; } @keyframes fadeInBody { to { opacity: 1; } } h1 { text-align: center; margin-top: 100px; margin-bottom: 15px; font-size: 32px; text-shadow: 0 0 15px #000; } .container { width: 90%; max-width: 1200px; margin: auto; padding-bottom: 50px; backdrop-filter: blur(2px); } p { text-align: center; font-size: 18px; text-shadow: 0 0 8px #000; max-width: 900px; margin: 20px auto; } model-viewer { width: 100%; height: 600px; margin-top: 30px; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 150, 255, 0.5); } @media (max-width: 768px) { h1 { font-size: 26px; margin-top: 90px; } model-viewer { height: 420px; } } #loading-overlay::before { content: ""; position: absolute; inset: -50%; animation: scanMove 3.5s linear infinite; mix-blend-mode: screen; pointer-events: none; } .loader-card { position: relative; padding: 26px 26px 22px; border-radius: 18px; box-shadow: 0 0 30px rgba(0, 194, 255, 0.45), 0 0 80px rgba(0, 0, 0, 0.9); border: 1px solid rgba(148, 163, 184, 0.3); max-width: 320px; width: 90%; backdrop-filter: blur(10px); text-align: center; } .loader-card::before { content: ""; position: absolute; inset: -1px; border-radius: inherit; opacity: 0.6; filter: blur(10px); z-index: -1; animation: glowPulse 4s ease-in-out infinite; } .loading-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 18px; } .loading-logo img { width: 34px; height: 34px; border-radius: 999px; padding: 4px; box-shadow: 0 0 18px rgba(0, 194, 255, 0.6); } .loading-logo span { font-size: 15px; letter-spacing: 0.16em; text-transform: uppercase; color: #e5e7eb; opacity: 0.9; } .loader-orb { position: relative; width: 84px; height: 84px; margin: 0 auto 16px; } .orb-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid rgba(148, 163, 184, 0.3); border-top-color: var(--accent); border-right-color: rgba(56, 189, 248, 0.9); animation: orbSpin 1.5s linear infinite; box-shadow: 0 0 18px rgba(0, 194, 255, 0.7), 0 0 32px rgba(37, 99, 235, 0.4); } .orb-core { position: absolute; inset: 18px; border-radius: 50%; box-shadow: 0 0 24px rgba(56, 189, 248, 0.9), 0 0 60px rgba(0, 0, 0, 1); } .loading-text { font-size: 15px; line-height: 1.4; margin-bottom: 14px; color: #e5e7eb; opacity: 0.92; } .loading-subtext { font-size: 12px; color: #9ca3af; margin-bottom: 16px; } .progress-shell { position: relative; width: 100%; } .progress-bar { width: 100%; height: 8px; border-radius: 999px; overflow: hidden; border: 1px solid rgba(148, 163, 184, 0.5); } .progress-fill { width: 0%; height: 100%; box-shadow: 0 0 16px rgba(56, 189, 248, 0.9), 0 0 30px rgba(56, 189, 248, 0.8); border-radius: inherit; transition: width 0.25s ease-out; } .progress-glow { position: absolute; inset: 0; border-radius: 999px; pointer-events: none; opacity: 0.0; animation: progressGlow 1.8s ease-in-out infinite; } .overlay-hint { margin-top: 8px; font-size: 11px; color: #9ca3af; letter-spacing: 0.08em; text-transform: uppercase; } #loading-overlay.fade-out { animation: overlayFadeOut 0.5s ease-in forwards; pointer-events: none; } @keyframes overlayFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } } @keyframes overlayFadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-4px); } } @keyframes orbSpin { to { transform: rotate(360deg); } } @keyframes glowPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.03); } } @keyframes scanMove { 0% { transform: translateY(-50%); } 100% { transform: translateY(50%); } } @keyframes progressGlow { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.5; } } 
    html, body {
      overflow-x: hidden !important;

      position: relative !important;

<script defer="" src="/assets/js/model-viewer-debug.js"></script>

<body>
<!-- Глобальный хедер -->
<div data-include="/header-ru.html"></div>
<main>
<h1 style="margin-top: 20px;">Спутник</h1>
<div class="container">
<p>«Спутник-1», запущенный 4 октября 1957 года, является первым в мире искусственным спутником Земли.</p>
<model-viewer ar="" ar-modes="webxr scene-viewer quick-look" camera-controls="" data-model-name="sputnik" id="main-model" src="/assets/models/sputnik.glb">
</model-viewer>
</div>
</main>
<!-- Глобальный футер -->

  <!-- ═══════════════════════════════════════
       ADD TO CART — 50 TL
  ════════════════════════════════════════════ -->
  <div class="mv-add-cart-wrap" id="mvCartWrap">
    <button class="mv-add-cart-btn" id="mvAddCartBtn">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;flex-shrink:0"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Sepete Ekle
    </button>
    <span class="mv-price-label">50 TL</span>
  </div>

  <script>
  (function(){
    var btn = document.getElementById('mvAddCartBtn');
    if (!btn) return;
    function getModelName() {
      var h1 = document.querySelector('h1');
      if (h1) return h1.textContent.trim();
      return document.title.split('\u2013')[0].split('-')[0].trim() || 'Model';
    }
    function getSlug() {
      var m = window.location.pathname.match(/atlas\/([^\/]+)/);
      return m ? m[1] : 'model';
    }
    function getImage() {
      var v = document.getElementById('mainViewer');
      if (v) {
        var src = v.getAttribute('src') || '';
        var m = src.match(/\/assets\/models\/([^.]+)\.glb/);
        if (m) return '/assets/models-pictures/' + m[1] + '.png';
      }
      return '/assets/icons/alien.png';
    }
    function showToast(name) {
      var t = document.getElementById('albaCartToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'albaCartToast';
        t.className = 'alba-cart-toast';
        document.body.appendChild(t);
      }
      t.textContent = '\uD83D\uDED2 ' + name + ' sepete eklendi!';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    btn.addEventListener('click', function(){
      var id = getSlug(), name = getModelName(), img = getImage(), price = 50;
      if (window.cartManager && window.cartManager.addItem) {
        window.cartManager.addItem({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 });
      } else {
        try {
          var cart = JSON.parse(localStorage.getItem('alba_space_cart_v1') || '[]');
          var idx = cart.findIndex(function(e){ return e.id === id; });
          if (idx >= 0) { cart[idx].qty += 1; }
          else { cart.push({ id:id, name:name, price:price, image:img, url:window.location.href, qty:1 }); }
          localStorage.setItem('alba_space_cart_v1', JSON.stringify(cart));
          var total = cart.reduce(function(s,e){ return s+(Number(e.qty)||0); }, 0);
          document.querySelectorAll('[data-cart-count],.cart-count').forEach(function(b){ b.textContent=String(total); });
        } catch(ex){}
      }
      showToast(name);
    });
  }());
  </script>

  <div data-include="/footer-ru.html"></div>
<!-- Model Viewer Fix Script - Direct initialization -->
<script>
    (function() {
      console.log('[Model-Viewer Init] Checking model-viewer status...');
      
      // Wait for model-viewer to be loaded
      const checkModelViewer = () => {
        const viewer = document.querySelector('model-viewer');
        if (!viewer) {
          console.log('[Model-Viewer Init] No model-viewer element found');
          return;
        }
        
        // Check if custom element is registered
        if (window.customElements && window.customElements.get('model-viewer')) {
          console.log('[Model-Viewer Init] model-viewer element is registered ✓');
          return;
        }
        
        // If not registered yet, check again in 500ms
        setTimeout(checkModelViewer, 500);
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkModelViewer);
      } else {
        setTimeout(checkModelViewer, 100);
      }
    })();
  </script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var viewer = document.getElementById('mainViewer');
        if (!viewer) return;
        var pathMatch = window.location.pathname.match(/atlas-[^\/]+/);
        var slug = pathMatch ? pathMatch[0] : null;
        if (!slug) return;

        viewer.setAttribute('src', '/assets/models/zaglushka.glb');

        fetch('https://albaspace-api.nncdecdgc.workers.dev/product-access?slug=' + slug, {
          credentials: 'include'
        })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if (data && data.access === 'premium') {
            return fetch(
              'https://albaspace-api.nncdecdgc.workers.dev/model?slug=' + slug,
              { credentials: 'include' }
            )
            .then(function(r){ return r.blob(); })
            .then(function(blob){ viewer.setAttribute('src', URL.createObjectURL(blob)); });
          }
        })
        .catch(function(e){ console.error('Model load error:', e); });
      });
    </script>
</body>
</html>
