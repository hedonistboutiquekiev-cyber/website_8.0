<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Аккаунт – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/assets/css/site.css">
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/worker-auth.js" defer></script>
  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: #020617;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .am-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: calc(100vh - 400px); /* Adjust based on footer height */
      padding: 0 0 60px;
    }

    /* ── Top bar ── */
    .am-topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .am-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .am-back:hover { color: #fff; }
    .am-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

    .am-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .am-placeholder { width: 48px; } /* balance the back button */

    /* ── Avatar + name card ── */
    .am-user-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 20px 24px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    /* Fix: ensure hidden attribute works even with display:flex */
    .am-user-card[hidden] { display: none !important; }

    .am-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,194,255,0.5);
      box-shadow: 0 0 24px rgba(0,194,255,0.2);
    }

    .am-name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      text-align: center;
    }

    .am-email {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: -6px;
    }

    /* ── Menu items ── */
    .am-menu {
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .am-menu[hidden] { display: none !important; }

    .am-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
    }
    .am-item:hover, .am-item:active {
      background: rgba(0,194,255,0.1);
      border-color: rgba(0,194,255,0.3);
      transform: translateX(2px);
    }

    .am-item svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
      stroke: #00c2ff;
      fill: none;
      stroke-width: 1.8;
    }

    .am-item-label { flex: 1; }

    .am-item-arrow {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.3);
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .am-item.logout {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .am-item.logout:hover {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.35);
    }
    .am-item.logout svg { stroke: #f87171; }

    /* ── Logged out state ── */
    .am-logged-out {
      width: 100%;
      max-width: 400px;
      padding: 32px 16px 0;
      box-sizing: border-box;
      text-align: center;
    }
    .am-logged-out[hidden] { display: none !important; }

    .am-logged-out .am-avatar-placeholder {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .am-logged-out .am-avatar-placeholder svg {
      width: 40px; height: 40px;
      stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 1.5;
    }

    .am-logged-out h2 {
      font-size: 20px; font-weight: 600; margin: 0 0 8px; color: #fff;
    }
    .am-logged-out p {
      font-size: 14px; color: rgba(255,255,255,0.5); margin: 0 0 28px;
    }

    .am-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.15s;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }
    .am-btn:active { transform: scale(0.98); }
    .am-btn-primary {
      background: #00c2ff;
      color: #020617;
    }
    .am-btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .am-btn-google {
      background: #fff;
      color: #333;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .am-btn-google img { width: 20px; height: 20px; }

    .am-btn-group {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 400px;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .am-btn-group[hidden] { display: none !important; }
  </style>
</head>
<body>
<div class="am-page">

  <div class="am-topbar">
    <a href="javascript:history.back()" class="am-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Назад
    </a>
    <span class="am-title">Аккаунт</span>
    <div class="am-placeholder"></div>
  </div>

  <!-- LOGGED IN -->
  <div class="am-user-card" id="amLoggedIn" hidden>
    <img id="amAvatar" class="am-avatar" src="/assets/icons/alien.png" alt="">
    <div class="am-name" id="amName">Пользователь</div>
    <div class="am-email" id="amEmail"></div>
  </div>

  <div class="am-menu" id="amMenuItems" hidden>
    <a href="/rus/account.html" class="am-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="am-item-label">Аккаунт</span>
      <svg class="am-item-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a href="/rus/favorites.html" class="am-item">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="am-item-label">Избранное</span>
      <svg class="am-item-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a href="/rus/orders.html" class="am-item">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="am-item-label">Покупки</span>
      <svg class="am-item-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <button class="am-item logout" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="am-item-label">Выйти</span>
    </button>
  </div>

  <!-- LOGGED OUT -->
  <div class="am-logged-out" id="amLoggedOut">
    <div class="am-avatar-placeholder">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <h2>Войдите</h2>
    <p>Войдите чтобы получить доступ к аккаунту</p>
  </div>

  <div class="am-btn-group" id="amLoginBtns">
    <button class="am-btn am-btn-google" onclick="login({ source: 'account-menu' })">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Войти через Google
    </button>
    <a href="javascript:void(0);" class="am-btn am-btn-primary open-login">Войти</a>
    <a href="javascript:void(0);" class="am-btn am-btn-secondary open-signup">Регистрация</a>
  </div>

</div>

<div data-include="/footer-ru.html"></div>

<script>
// Update UI when auth state is known
function updateAccountMenuPage(user) {
  var loggedIn = !!(user && (user.name || user.email || user.avatar));

  document.getElementById('amLoggedIn').hidden = !loggedIn;
  document.getElementById('amMenuItems').hidden = !loggedIn;
  document.getElementById('amLoggedOut').hidden = loggedIn;
  document.getElementById('amLoginBtns').hidden = loggedIn;

  if (loggedIn) {
    var avatar = document.getElementById('amAvatar');
    var name = document.getElementById('amName');
    var email = document.getElementById('amEmail');
    if (avatar) {
      avatar.src = user.avatar || '/assets/icons/alien.png';
      if (user.avatar) avatar.crossOrigin = 'anonymous';
    }
    if (name) name.textContent = user.name || user.email || 'Пользователь';
    if (email) email.textContent = user.email || '';
  }
}

// Override worker-auth updateAuthMenu to also update this page
var _origUpdateAuthMenu = window.updateAuthMenu;
window.updateAuthMenu = function(user) {
  if (_origUpdateAuthMenu) _origUpdateAuthMenu(user);
  updateAccountMenuPage(user);
};

// If worker-auth already ran, check current state
if (typeof checkUser === 'function') {
  checkUser();
}

// After logout — go back
var _origLogout = window.logout;
window.logout = function() {
  if (_origLogout) _origLogout();
  setTimeout(function() { window.location.href = '/'; }, 500);
};
</script>
</body>
</html>
