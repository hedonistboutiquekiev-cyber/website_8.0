<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Curiosity – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js" crossorigin="anonymous"></script>
  <!-- styles via site.css -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'tr';
      document.documentElement.lang = lang;
      const trBtn = document.getElementById('lang-tr');
      const enBtn = document.getElementById('lang-en');
      if (trBtn && enBtn) {
        if (lang === 'tr') {
          trBtn.classList.add('active');
        } else {
          enBtn.classList.add('active');
        }
        function setLang(code) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', code);
          window.location.href = url.toString();
        }
        trBtn.onclick = () => setLang('tr');
        enBtn.onclick = () => setLang('en');
      }
    });
  </script>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/model-viewer-debug.js" defer></script>
<style>
    html, body {
      overflow-x: hidden !important;
      width: 100% !important;
      position: relative !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    * {
      box-sizing: border-box !important;
    }
    </style></head>
<body class="index-page">
  <div data-include="/header-tr.html"></div>

  <h1 style="margin-top: 20px;">TOYOTA C-HR</h1>

  <div class="container">
    <p>Modern bir SUV'dur ve yüksek performansı ile dikkat çeker.</p>
    <model-viewer data-track="model_view" data-model-name="perseverance" src="/assets/models/toyota.glb" camera-controls ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
  </div>
  <div data-include="/footer-tr.html"></div>

    <!-- Model Viewer Fix Script - Direct initialization -->
  <script>
    (function() {
      console.log('[Model-Viewer Init] Checking model-viewer status...');
      
      // Wait for model-viewer to be loaded
      const checkModelViewer = () => {
        const viewer = document.querySelector('model-viewer');
        if (!viewer) {
          console.log('[Model-Viewer Init] No model-viewer element found');
          return;
        }
        
        // Check if custom element is registered
        if (window.customElements && window.customElements.get('model-viewer')) {
          console.log('[Model-Viewer Init] model-viewer element is registered ✓');
          return;
        }
        
        // If not registered yet, check again in 500ms
        setTimeout(checkModelViewer, 500);
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkModelViewer);
      } else {
        setTimeout(checkModelViewer, 100);
      }
    })();
  </script>
</body>
</html>
